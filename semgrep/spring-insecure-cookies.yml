rules:
  - id: spring-cookie-missing-secure-httponly
    languages: [java]
    severity: WARNING
    message: Cookie created without setSecure(true) and setHttpOnly(true).
    metadata:
      category: security
      cwe: "CWE-1004"
    patterns:
      - pattern: |
          $C = new Cookie($N, $V);
      - pattern-not-inside: |
          {
            ...
            $C.setSecure(true);
            ...
            $C.setHttpOnly(true);
            ...
          }

  - id: spring-responsecookie-not-secure
    languages: [java]
    severity: WARNING
    message: ResponseCookie built without secure(true) + httpOnly(true). Set SameSite=Strict|Lax for session/CSRF cookies.
    metadata:
      category: security
      cwe: "CWE-1004"
    patterns:
      - pattern-either:
          - pattern: ResponseCookie.from($N, $V).build()
          - pattern: ResponseCookie.from($N, $V).$M1(...).build()
          - pattern: ResponseCookie.from($N, $V).$M1(...).$M2(...).build()
          - pattern: ResponseCookie.from($N, $V).$M1(...).$M2(...).$M3(...).build()
          - pattern: ResponseCookie.from($N, $V).$M1(...).$M2(...).$M3(...).$M4(...).build()
          - pattern: ResponseCookie.from($N, $V).$M1(...).$M2(...).$M3(...).$M4(...).$M5(...).build()
      - pattern-not-regex: 'secure\(\s*true\s*\)[^;]*httpOnly\(\s*true\s*\)'
      - pattern-not-regex: 'httpOnly\(\s*true\s*\)[^;]*secure\(\s*true\s*\)'
