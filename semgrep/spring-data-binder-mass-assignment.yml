rules:
  # Controller method takes a POJO with no @RequestBody. Spring's WebDataBinder
  # walks property paths from the request — including class.module.classLoader.*
  # (Spring4Shell). Use a dedicated DTO or annotate the param.
  - id: spring-mvc-pojo-parameter-without-requestbody
    languages: [java]
    severity: WARNING
    message: >-
      Controller takes a POJO without @RequestBody / @ModelAttribute. Spring
      will bind every request parameter into the object's property tree
      (mass assignment, plus the Spring4Shell class.module.classLoader chain).
      Use a separate DTO or add an @InitBinder with setAllowedFields /
      setDisallowedFields. This rule produces a finding on every controller
      with a POJO parameter. Pair with `spring-init-binder-missing-class-disallow`
      to identify which findings have no global mitigation.
    metadata:
      category: security
      cwe: "CWE-915"
      owasp: "A08:2021"
      confidence: MEDIUM
      references:
        - https://spring.io/security/cve-2022-22965/
        - https://spring.io/security/cve-2022-22968/
        - https://spring.io/security/cve-2024-38820/
    patterns:
      - pattern-either:
          - pattern-inside: |
              @Controller
              class $C { ... }
          - pattern-inside: |
              @RestController
              class $C { ... }
      - pattern-either:
          - pattern: |
              @RequestMapping(...) $RT $M(..., $POJO $P, ...) { ... }
          - pattern: |
              @GetMapping(...) $RT $M(..., $POJO $P, ...) { ... }
          - pattern: |
              @PostMapping(...) $RT $M(..., $POJO $P, ...) { ... }
          - pattern: |
              @PutMapping(...) $RT $M(..., $POJO $P, ...) { ... }
          - pattern: |
              @PatchMapping(...) $RT $M(..., $POJO $P, ...) { ... }
          - pattern: |
              @DeleteMapping(...) $RT $M(..., $POJO $P, ...) { ... }
      # v3 triage exposed a real bug: the original `pattern-not: ... @X $T $P`
      # block ONLY matched the bare-annotation form (`@RequestParam`). The
      # arg-bearing form (`@RequestParam("petId")`) — which is by far the
      # more common shape in real Spring code — slipped past, so any
      # parameter with `@RequestParam("name") <Type> <var>` produced a
      # false-positive "POJO-without-@RequestBody" finding. Cover both
      # forms explicitly for every parameter annotation.
      - pattern-not: |
          $RT $M(..., @RequestBody(...) $T $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., @RequestBody $T $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., @PathVariable(...) $T $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., @PathVariable $T $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., @RequestParam(...) $T $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., @RequestParam $T $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., @RequestHeader(...) $T $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., @RequestHeader $T $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., @CookieValue(...) $T $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., @CookieValue $T $P, ...) { ... }
      # @ModelAttribute is intentionally NOT excluded: WebDataBinder still
      # walks property paths on the bound POJO, so the
      # class.module.classLoader chain (Spring4Shell, CVE-2022-22965) works
      # through it. The reznok/Spring4Shell-POC controller binds via
      # @ModelAttribute Greeting greeting and is exploitable.
      - pattern-not: |
          $RT $M(..., HttpServletRequest $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., HttpServletResponse $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., HttpSession $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., Model $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., ModelMap $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., RedirectAttributes $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., BindingResult $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., MultipartFile $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., Principal $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., Authentication $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., Pageable $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., Sort $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., WebRequest $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., NativeWebRequest $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., ServerHttpRequest $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., ServerHttpResponse $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., UriComponentsBuilder $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., SessionStatus $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., String $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., int $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., long $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., Long $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., Integer $P, ...) { ... }
      - pattern-not: |
          $RT $M(..., UUID $P, ...) { ... }

  # @InitBinder that doesn't block class-path leaks. This is the precise
  # Spring4Shell shape.
  - id: spring-init-binder-missing-class-disallow
    languages: [java]
    severity: ERROR
    message: >-
      @InitBinder doesn't block property paths reaching ClassLoader (class.*,
      *.class.*, Class.*, *.Class.*). Add setDisallowedFields("class.*",
      "Class.*", "*.class.*", "*.Class.*") — the case-insensitive variant
      is what CVE-2024-38820 was about.
    metadata:
      category: security
      cwe: "CWE-915"
      references:
        - https://spring.io/security/cve-2022-22965/
        - https://spring.io/security/cve-2024-38820/
    patterns:
      - pattern: |
          @InitBinder
          $RT $M(WebDataBinder $B, ...) {
            ...
          }
      - pattern-not: |
          @InitBinder
          $RT $M(WebDataBinder $B, ...) {
            ...
            $B.setDisallowedFields(..., "=~/(?i).*class.*/", ...);
            ...
          }
      - pattern-not: |
          @InitBinder
          $RT $M(WebDataBinder $B, ...) {
            ...
            $B.setAllowedFields(...);
            ...
          }

  # Round 2: spring-jpa-entity-as-controller-parameter and its -precise
  # twin moved to semgrep-audit/spring-jpa-mass-assignment-audit.yml. The
  # v2 bench measured 0 TP / 7 FP on sampled findings, making them
  # unsuitable for the default pack. Run them explicitly when auditing for
  # mass-assignment risk.
