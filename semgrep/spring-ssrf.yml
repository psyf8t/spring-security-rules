rules:
  - id: spring-ssrf-tainted-http-client
    languages: [java]
    severity: ERROR
    mode: taint
    message: >-
      Outgoing HTTP request URL/host comes from the request. SSRF — internal
      services, cloud metadata (169.254.169.254), kubelet, etcd. Use a host
      allowlist and pre-resolve DNS to defeat rebinding.
    metadata:
      category: security
      cwe: "CWE-918"
      owasp: "A10:2021"
      references:
        - https://spring.io/security/cve-2024-22243/
    pattern-sources:
      - pattern-either:
          - pattern: (HttpServletRequest $R).getParameter(...)
          - pattern: (HttpServletRequest $R).getHeader(...)
          - pattern: (ServerHttpRequest $R).getQueryParams()
          - pattern: (ServerHttpRequest $R).getHeaders()
          - pattern: |
              @RequestParam $T $X
          - pattern: |
              @PathVariable $T $X
          - pattern: |
              @RequestHeader $T $X
          - pattern: |
              @RequestBody $T $X
          - pattern: |
              @ModelAttribute $T $X
    pattern-sinks:
      - pattern-either:
          # RestTemplate / RestOperations — keep only the method names that
          # are unique to RestTemplate (no overlap with Map / Statement /
          # ExecutorService). Bench v2 surfaced 59 findings on OWASP
          # Benchmark; 10/10 sampled were false positives where
          # `$RT.put($URL, ...)` matched `Map.put(key, val)`. Dropped:
          # `put`, `delete`, `execute` — the names alias common JDK
          # interfaces and Semgrep's open-source type tracking can't
          # resolve `restTemplate` field references reliably enough to
          # prefix them with `(RestTemplate $RT)`.
          - pattern: $RT.getForObject($URL, ...)
          - pattern: $RT.getForEntity($URL, ...)
          - pattern: $RT.postForObject($URL, ...)
          - pattern: $RT.postForEntity($URL, ...)
          - pattern: $RT.exchange($URL, ...)
          # WebClient — chained call shape, low FP risk
          - pattern: $WC.get().uri($URL, ...).$X(...)
          - pattern: $WC.post().uri($URL, ...).$X(...)
          - pattern: $WC.put().uri($URL, ...).$X(...)
          - pattern: $WC.delete().uri($URL, ...).$X(...)
          - pattern: $WC.method(...).uri($URL, ...).$X(...)
          # RestClient (Spring 6.1+)
          - pattern: $RC.get().uri($URL, ...).$X(...)
          - pattern: $RC.post().uri($URL, ...).$X(...)
          # JDK HttpClient
          - pattern: HttpRequest.newBuilder($URL, ...)
          - pattern: HttpRequest.newBuilder().uri($URL, ...)
          - pattern: $HC.send(HttpRequest.newBuilder($URL, ...).build(), ...)
          # OkHttp — type-anchored via fully-qualified ctor
          - pattern: new okhttp3.Request.Builder().url($URL).$X(...)
          # Apache HC — type-anchored via fully-qualified ctors
          - pattern: new org.apache.http.client.methods.HttpGet($URL)
          - pattern: new org.apache.http.client.methods.HttpPost($URL)
          # URI/URL constructors — actual gate to the network layer.
          - pattern: URI.create($URL)
          - pattern: new URL($URL)

  # RestTemplate follows redirects by default — a 30x to an internal address
  # bypasses any host allowlist applied to the original URL.
  - id: spring-rest-template-default-redirect-policy
    languages: [java]
    severity: INFO
    message: >-
      RestTemplate follows redirects by default. Set followRedirects=false on
      the ClientHttpRequestFactory if you rely on host allowlists.
    metadata:
      category: security
      cwe: "CWE-918"
    pattern-either:
      - pattern: new RestTemplate()
      - pattern: new RestTemplate(...)
