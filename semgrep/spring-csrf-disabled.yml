rules:
  - id: spring-security-csrf-disable
    languages: [java]
    severity: INFO
    message: >-
      CSRF disabled. Acceptable for stateless REST APIs using token-based
      auth (Authorization header + JWT/PASETO). Catastrophic for
      applications using cookie sessions. Verify session model before
      suppressing.
    metadata:
      category: security
      cwe: "CWE-352"
      owasp: "A01:2021"
      confidence: LOW
    pattern-either:
      - pattern: $H.csrf().disable()
      - pattern: $H.csrf(c -> c.disable())
      - pattern: $H.csrf(AbstractHttpConfigurer::disable)
