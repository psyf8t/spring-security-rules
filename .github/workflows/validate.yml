name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-semgrep-1.134.0

      - name: Install Semgrep (pinned)
        # Semgrep 1.134.0 pulls opentelemetry-instrumentation-requests, which
        # imports pkg_resources. setuptools >= 81 removed pkg_resources, so
        # we pin setuptools < 81 to keep semgrep's startup working.
        run: |
          pip install --no-cache-dir 'setuptools<81'
          pip install --no-cache-dir 'semgrep==1.134.0'

      - name: Validate default pack
        run: semgrep --validate --config semgrep/ --strict

      - name: Validate audit pack
        run: semgrep --validate --config semgrep-audit/ --strict

      - name: Run per-rule paired tests (default pack)
        run: |
          set -e
          fail=0
          for f in tests/spring-*.java tests/spring-*.properties; do
            [ -e "$f" ] || continue
            base=$(basename "$f")
            # `spring-cloud-gateway-actuator.gateway.properties` -> yaml stem
            stem=${base%.*}
            stem=${stem%.gateway}
            cfg="semgrep/${stem}.yml"
            if [ ! -f "$cfg" ]; then
              echo "no paired YAML for $f (looked for $cfg) — skipping"
              continue
            fi
            echo "::group::semgrep test $cfg <- $f"
            semgrep test --config "$cfg" "$f" || fail=1
            echo "::endgroup::"
          done
          exit $fail

      - name: Run per-rule paired tests (audit pack)
        run: |
          set -e
          fail=0
          for f in tests/rules-audit/*.java tests/rules-audit/*.properties; do
            [ -e "$f" ] || continue
            base=$(basename "$f")
            stem=${base%.*}
            cfg="semgrep-audit/${stem}.yml"
            if [ ! -f "$cfg" ]; then
              echo "no paired YAML for $f (looked for $cfg) — skipping"
              continue
            fi
            echo "::group::semgrep test $cfg <- $f"
            semgrep test --config "$cfg" "$f" || fail=1
            echo "::endgroup::"
          done
          exit $fail

      - name: Run CVE regression scans
        # CVE fixtures contain vulnerable code on purpose — `--error` would
        # turn every expected finding into a CI failure. `semgrep test`
        # cannot verify the // ruleid: markers either, because it rejects a
        # rules/tests split ("TODO: the split of tests/ and rules/ is not
        # supported yet"). Smoke test instead: each fixture must produce at
        # least one finding. If a rule regresses to silence on a known-bad
        # input, this step fails.
        run: |
          set -e
          for d in tests/cves/CVE-*; do
            echo "::group::semgrep scan $d"
            count=$(semgrep scan --config semgrep/ --json "$d" 2>/dev/null \
              | python3 -c "import json,sys; print(len(json.load(sys.stdin)['results']))")
            if [ "$count" -lt 1 ]; then
              echo "FAIL: $d produced 0 findings (expected at least 1)"
              exit 1
            fi
            echo "OK: $d produced $count finding(s)"
            echo "::endgroup::"
          done

  codeql:
    runs-on: ubuntu-latest
    # CodeQL CLI install is heavy; only run on demand or weekly.
    if: contains(github.event.pull_request.labels.*.name, 'codeql') || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: java
      - name: Compile CodeQL queries
        run: |
          set -e
          for q in codeql/*.ql; do
            echo "::group::codeql query compile $q"
            codeql query compile --search-path . "$q"
            echo "::endgroup::"
          done
